name: Universal Multi-Platform App Builder

on:
  workflow_dispatch: 

# ==========================================
# 🎛️ CONFIGURATION ZONE
# Change these two values to instantly re-brand the pipeline
# ==========================================
env:
  APP_NAME: "App"
  APP_ID: "com.anon.app"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Base Packages
        run: npm install --legacy-peer-deps

      - name: Inject Capacitor Configurations
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps
          
          cat << 'EOF' > capacitor.config.json
          {
            "appId": "${{ env.APP_ID }}",
            "appName": "${{ env.APP_NAME }}",
            "webDir": "dist"
          }
          EOF

      - name: Compile Production Web Assets
        run: npm run build

      - name: Construct Mobile Native Project
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Web Files to Android Wrapper
        run: npx cap sync android

      - name: Handle Custom Icon Logic (Android)
        shell: bash
        run: |
          if [ -f "logo.png" ] || [ -f "icon.png" ]; then
            SRC_IMG=$( [ -f "logo.png" ] && echo "logo.png" || echo "icon.png" )
            npm install jimp@0.22.12 --legacy-peer-deps
            node -e "
              const Jimp = require('jimp');
              Jimp.read('$SRC_IMG').then(img => {
                const max = Math.max(img.bitmap.width, img.bitmap.height);
                new Jimp(max, max, 0x00000000, (err, square) => {
                  if (err) throw err;
                  const x = Math.floor((max - img.bitmap.width) / 2);
                  const y = Math.floor((max - img.bitmap.height) / 2);
                  square.composite(img, x, y).write('square-logo.png', () => {
                    console.log('Successfully padded source asset to a perfect square canvas.');
                  });
                });
              }).catch(process.exit);
            "
            sleep 2
            
            mkdir -p assets
            cp square-logo.png assets/logo.png
            
            npm install @capacitor/assets --legacy-peer-deps
            npx @capacitor/assets generate
          fi

      - name: Compile Debug APK Binary
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Android-App
          path: android/app/build/outputs/apk/debug/*.apk

  build-desktop:
    name: Build Desktop App
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact_suffix: Windows-Exe
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - platform: macos-latest
            artifact_suffix: Mac-Dmg
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Frontend Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Frontend Web Assets
        run: npm run build

      - name: Scaffold & Mock Tauri Project Map
        shell: bash
        run: |
          echo "Installing local Tauri system CLI layer..."
          npm install -D @tauri-apps/cli --legacy-peer-deps
          
          echo "Automating full baseline Rust boilerplate setup..."
          npx tauri init --ci --force
          
          echo "Dynamically compiling generalized configurations..."
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            
            const tauriConfig = {
              '\$schema': 'https://schema.tauri.app/config/2',
              'productName': process.env.APP_NAME,
              'version': pkg.version || '1.0.0',
              'identifier': process.env.APP_ID,
              'build': {
                'beforeBuildCommand': '',
                'beforeDevCommand': '',
                'devUrl': 'http://localhost:5173',
                'frontendDist': '../dist'
              },
              'app': {
                'windows': [{
                  'title': process.env.APP_NAME,
                  'width': 1024,
                  'height': 768,
                  'resizable': true,
                  'fullscreen': false
                }]
              },
              'bundle': {
                'active': true,
                'category': 'Games',
                'targets': 'all',
                'icon': [
                  'icons/32x32.png',
                  'icons/128x128.png',
                  'icons/128x128@2x.png',
                  'icons/icon.icns',
                  'icons/icon.ico'
                ]
              }
            };
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauriConfig, null, 2));
          "

      - name: Generate Cross-Platform Desktop App Icons
        shell: bash
        run: |
          if [ -f "logo.png" ]; then
            npx tauri icon logo.png
          elif [ -f "icon.png" ]; then
            npx tauri icon icon.png
          elif [ -f "icon.ico" ]; then
            cp icon.ico src-tauri/icons/icon.ico
          else
            echo "No custom branding assets found. Defaulting to system fallback icons."
          fi

      - name: Initialize Stable Rust Compiler
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Smart Rust Compilation Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build Tauri Desktop Executables Native Execution
        run: npx tauri build

      - name: Upload Finished Desktop Executables
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.artifact_suffix }}
          path: ${{ matrix.artifact_path }}
